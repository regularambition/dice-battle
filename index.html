<!DOCTYPE html>
<html>

<head>
  <title>Dice Battle</title>
</head>

<body>
  <header>
    <div>プレイヤー名：<span id="playerName">(初期化未完)</span></div>
  </header>

  <!-- タイトル画面 -->
  <div id="screen-title">
    <h1>Dice Battle</h1>
    <button id="startBtn">ゲーム開始</button>
  </div>

  <!-- 名前入力画面 -->
  <div id="screen-name" style="display:none;">
    <h1>ハンドルネームを入力</h1>
    <input id="nameInput" />
    <button id="nameSubmit">決定</button>
  </div>

  <!-- モード選択画面 -->
  <div id="screen-menu" style="display:none;">
    <h1>マッチ形式選択</h1>
    <button id="randomBtn">ランダムマッチ</button>
    <button id="privateBtn">プライベートマッチ</button>
  </div>

  <!-- ランダムマッチング待機画面 -->
  <div id="screen-random-match-waiting" style="display:none;">
    <h1>対戦相手を探しています</h1>
    <button id="randomMatchCancelBtn">やめる</button>
    <p id="randomMatchWaitingNotification"></p>
  </div>

  <!-- ランダムマッチ対戦画面 -->
  <div id="screen-game" style="display:none;">
    <h2>ゲーム画面</h2>
    <div>Room: <span id="roomId"></span> </div>
    <div>相手の名前：<span id="opponentName"></span> </div>
    <button id="rollBtn">Roll!</button>
    <div id="result"></div>
    <div id="opponentConnectionNotification"></div>

    <div id="rematchArea" style="display:none;">
      <p>同じ相手との再戦を希望しますか（残り<span id="rematchRemainingTime"></span>秒）</p>
      <button id="rematchBtn">はい</button>
      <button id="leaveBtn">いいえ</button>
      <div id="rematchStatus"></div>
    </div>
  </div>

  <!-- プライベートマッチ部屋作成・入室選択画面 -->
  <div id="screen-private-match-choice" style="display:none;">
    <h1>部屋を建てるか部屋に入るかを選択してください</h1>
    <button id="privateHostBtn">自分が部屋を建てる</button>
    <button id="privateGuestBtn">誰かの部屋に入る</button>
    <button id="privateCancelBtn">マッチ形式選択へ戻る</button>
  </div>

  <!-- プライベートマッチ部屋作成選択後の画面 -->
  <div id="screen-private-match-host" style="display:none;">
    <h1>あなたの建てた部屋のIDは以下の通りです</h1>
    <p id="myPrivateRoomId"></p>
    <button id="myPrivateRoomIdCopyBtn">IDをクリップボードにコピー</button>
    <button id="privateHostCancelBtn">入室受付をやめる</button>
    <p id="privateMatchHostWaitingNotification"></p>
  </div>

  <!-- プライベートマッチ入室選択後の画面 -->
  <div id="screen-private-match-guest" style="display:none;">
    <h1>入る部屋のIDを入力してください</h1>
    <input id="privateRoomIdInput" />
    <button id="privateRoomIdInputConfirmBtn">このIDを与えられた部屋に入る</button>
    <button id="privateGuestCancelBtn">やめる</button>
    <p id="privateMatchGuestWaitingNotification"></p>
  </div>

  <script type="module" src="app.js"></script>
</body>

</html>
